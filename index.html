<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora - Modern Productivity Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1 id="login-logo">Memora</h1>
                <p>Login to your account</p>
            </div>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="auth-switch">
                Don't have an account? <a href="#" id="show-register">Register</a>
            </p>
        </div>
    </div>

    <!-- Register Page -->
    <div id="register-page" class="auth-page hidden">
        <div class="auth-container">
            <div class="auth-header">
                <h1 id="register-logo">Memora</h1>
                <p>Create your account</p>
            </div>
            <form id="register-form">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <input type="password" id="register-confirm-password" placeholder="Confirm Password" required>
                <input type="text" id="register-key" placeholder="Activation Key" required>
                <button type="submit">Register</button>
            </form>
            <p class="auth-switch">
                Already have an account? <a href="#" id="show-login">Login</a>
            </p>
        </div>
    </div>

    <!-- Admin Page -->
    <div id="admin-page" class="admin-page hidden">
        <div class="admin-page-container">
            <div class="admin-page-header">
                <button class="back-btn" id="back-to-chat">← Back to Chat</button>
                <h2>Admin Panel</h2>
            </div>
            
            <div id="admin-login-section" class="admin-login-section">
                <div class="admin-login-card">
                    <h3>Admin Access</h3>
                    <p>Enter admin password to access settings</p>
                    <input type="password" id="admin-password" placeholder="Admin Password">
                    <button id="admin-login-btn">Access Panel</button>
                </div>
            </div>
            
            <div id="admin-settings-section" class="admin-settings-section hidden">
                <div class="admin-settings-card">
                    <div class="admin-section">
                        <h3>Logo</h3>
                        <div class="logo-upload">
                            <div class="logo-preview" id="logo-preview">
                                <span id="logo-text">Memora AI</span>
                            </div>
                            <input type="file" id="logo-upload" accept="image/*" style="display: none;">
                            <button id="upload-logo-btn">Upload Logo</button>
                            <button id="remove-logo-btn" class="hidden">Remove Logo</button>
                        </div>
                    </div>
                    
                    <div class="admin-section">
                        <h3>Accent Color</h3>
                        <div class="color-picker">
                            <input type="color" id="new-accent" value="#6366f1">
                            <button id="save-accent">Save Color</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container" class="container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button class="admin-btn" id="admin-btn">⚙️</button>
            <div class="logo">
                <h1 id="app-logo">Memora AI</h1>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="user-info">
                    <span class="user-name" id="current-username">Guest</span>
                    <button class="logout-btn" id="logout-btn">Logout</button>
                </div>
            </header>

            <!-- AI Chat Interface -->
            <section id="ai-chat" class="chat-section active">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai-message">
                            <div class="message-content">
                                <p>Hello! I'm your AI assistant. How can I help you today?</p>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <textarea id="chatInput" placeholder="Type your message..." rows="1"></textarea>
                        <button id="sendMessage">Send</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
